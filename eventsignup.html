<!DOCTYPE html>
<html>
    <!-- Metadata & CSS Content of the Webpage -->
    <head>
        <!-- Metadata (name of the webpage)-->
        <title>Event Sign Ups</title>
        <!-- CSS File Link -->
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
        <script src="https://code.jquery.com/color/jquery.color-2.1.2.min.js"
          integrity="sha256-H28SdxWrZ387Ldn0qogCzFiUDDxfPiNIyJX7BECQkDE="
          crossorigin="anonymous"></script>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">

        <link rel="icon" type="image/x-icon" href="Pictures/interactClubLogoSmall.png">
    </head>

    <!-- HTML Content of the Webpage-->
    <body>
        <header>
            <nav>
                <span>
                    <img src = "Pictures/interactClubLogo.png" id = "logo_top">
                </span>
                <ul>
                    <li><a href = "index.html">Home</a></li>
                    <li><a href = "eventsignup.html">Event Sign Ups</a></li>
                    <li><a href = "calendar.html">Calendar</a></li>
                </ul>
            </nav>
            <div>
                <h1 id = "otherHeaders">Event Sign Ups</h1>
            </div>
        </header>

        <div class = "container">
            <div id = "subheader" style = "background-color: #00401F; color: white; font-size: 2vw;">
                <p> Check out the event sign ups below if you're interested! </p>
            </div>
        </div>
        <div class= "container">
            <h1 id = "otherHeaders" style = "font-size: 3vw;">Original iframe Implementation (Scroll Down for Other Technique):</h1>
        </div>
        <div class = "container">
            <iframe src="https://docs.google.com/document/d/e/2PACX-1vQRsMnCEnBc8T-G_LMz-TzOrOWabcyz-ZK29gjEHw2wZsa6UDpD-V4HsjctoUYQF0vwBcAmYc9elD0n/pub?embedded=true" contenteditable="true"></iframe>
        </div>

        <div class = "containerNoGap">
            <a  id = "buttonLink0">Sign Up Here</a>
        </div>

        <div class= "container">
            <h1 id = "otherHeaders" style = "font-size: 3vw;">Built-In Sign Up Implementation:</h1>
        </div>

        <div class= "container">
            <img src = "Pictures/peacefulSchools.png" id = "flex_img" style = "margin-top: 0.5vh;">
        </div>

        <div class = "containerNoGap">
            <a style = "text-decoration: underline" target="_blank" href = "https://docs.google.com/document/d/1ERTlVIWi1pcHFligupbkcTBh4Or2MY3r35jAj8Rgyfg/edit?tab=t.0">More Details</p>
            </div>

        <div id = "buttonDiv">
            <a  id = "buttonLink1">Sign Up</a>
            <a  id = "buttonLink2">Take Your Name Off</a>
            <a  id = "buttonLink3">See Others Signed Up</a>
        </div>

        <div class = "container">
            <p id = "list"></p>
        </div>

        <script>
            var user_num = localStorage.getItem("user_num");
            if (!user_num) {
                user_num = 0;
                localStorage.setItem("user_num", user_num);
            } else {
                user_num = parseInt(localStorage.getItem("user_num"));
            }

            $("li a").hover(function(){
                $(this).css("color", "black");
            }, function(){
                $(this).css("color", "gray");
            });

            $("#logo_top").click(function(){
                window.location.href = 'index.html';
            });

            $("#buttonLink0").click(function(){
                window.location.href = 'https://docs.google.com/document/d/e/2PACX-1vQRsMnCEnBc8T-G_LMz-TzOrOWabcyz-ZK29gjEHw2wZsa6UDpD-V4HsjctoUYQF0vwBcAmYc9elD0n/pub?embedded=true';
            });

            $("#buttonLink1").click(function(){
                var name = prompt("What is your name?");
                var email = prompt("What is your email?");
                var phone = prompt("What is your phone number?");
                var password = prompt("What password would you like to use?");
                if (name != null && name != "")
                {
                    localStorage.setItem("user" + user_num, name);
                    localStorage.setItem("email" + user_num, email);
                    localStorage.setItem("phone" + user_num, phone);
                    localStorage.setItem("password"+ user_num, password);
                    user_num++;
                    localStorage.setItem("user_num", user_num);
                    alert("You are now signed up!");
                }
            });

            $("#buttonLink2").click(function(){
                var name = prompt("What is your name?");
                var password = prompt("What is your password?");
                for (var i = 1; i <= user_num; i++)
                {
                    if (localStorage.getItem("user" + i) == name && localStorage.getItem("password" + i) == password)
                    {
                        localStorage.removeItem("user" + i);
                        localStorage.removeItem("email" + i);
                        localStorage.removeItem("phone" + i);
                        localStorage.removeItem("password" + i);
                        user_num--;
                        localStorage.setItem("user_num", user_num);
                        alert("You have been removed from the sign up list.");
                        break;
                    }
                }
                alert("Name or password not found.");
            });
            $("#buttonLink3").click(function(){
                var userList = "";
                for (var i = 1; i <= user_num; i++)
                {
                    if (localStorage.getItem("user" + i) != null)
                    {
                        if (localStorage.getItem("user" + (i + 1)) != null)
                        {
                            userList += localStorage.getItem("user" + i) + " | ";
                        }
                        else
                        {
                            userList += localStorage.getItem("user" + i);
                        }
                    }
                }
                $("#list").html(userList);
            });
        </script>
    </body>
</html>
